name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check Python syntax
        run: python -m py_compile scripts/*.py
      - name: Validate router contract
        run: python scripts/router_contract_validator.py assets/templates/ROUTER_CONTRACT.json --corpus assets/templates/ROUTER_PROMPT_CORPUS.json
